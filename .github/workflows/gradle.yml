name: Build PvpHUD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: chmod +x pvphud-v2/gradlew && cd pvphud-v2 && ./gradlew build --no-daemon
      - uses: actions/upload-artifact@v3
        with:
          name: pvphud-mod
          path: pvphud-v2/build/libs/pvphud-*.jar
          if-no-files-found: error

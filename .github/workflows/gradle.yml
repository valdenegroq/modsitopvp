name: Build PvpHUD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - run: cd pvphud-v2 && gradle build --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: pvphud-mod
          path: pvphud-v2/build/libs/pvphud-*.jar
          if-no-files-found: error
